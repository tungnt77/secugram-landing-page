<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Infrastructure Platform — Secugram</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230d1b2e'/%3E%3Cpath d='M32 8 50 18v14c0 14-18 24-18 24S14 46 14 32V18L32 8Z' fill='none' stroke='%2314b8a6' stroke-width='4'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./service-pages.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Open Sans', sans-serif; -webkit-font-smoothing: antialiased; background: #fff; }
    button { font: inherit; min-width: 44px; min-height: 44px; }
    input, textarea { min-height: 44px; }
    .sg-menu-toggle { display: none; }
    .sg-nav-link, .sg-nav-cta {
      min-height: 44px;
      display: inline-flex !important;
      align-items: center !important;
    }
    @media (max-width: 860px) {
      [data-tw-nav] { padding: 0 20px !important; }
      .sg-logo-button img { width: 156px !important; }
      .sg-menu-toggle {
        display: inline-flex;
        width: 44px; height: 44px;
        border: 1px solid #e5e7eb; border-radius: 9999px;
        background: #ffffff; align-items: center; justify-content: center;
        flex-direction: column; gap: 4px; cursor: pointer;
      }
      .sg-menu-toggle span { width: 18px; height: 2px; background: #1e3a5f; border-radius: 2px; }
      .sg-nav-links {
        position: absolute; top: 72px; left: 16px; right: 16px;
        display: none !important; flex-direction: column;
        align-items: stretch !important; gap: 6px !important; padding: 14px;
        border: 1px solid #e5e7eb; border-radius: 16px; background: #ffffff;
        box-shadow: 0 18px 48px rgba(30,58,95,0.16); z-index: 99;
      }
      .sg-nav-links[data-open='true'] { display: flex !important; }
      .sg-nav-link {
        min-height: 44px; width: 100%; text-align: left;
        padding: 11px 14px !important; border-bottom: none !important;
        border-radius: 10px !important;
      }
      .sg-nav-cta { justify-content: center !important; text-align: center; border-radius: 10px !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="../dist/secure-infrastructure.js"></script>
</body>
</html>
