  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'Open Sans', sans-serif; -webkit-font-smoothing: antialiased; background: var(--tw-page-bg); }
    #page-scroll { height: 100vh; overflow-y: auto; scroll-behavior: smooth; background: var(--tw-page-bg); }
    #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--tw-brand); color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14px; padding: 12px 28px; border-radius: 9999px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); transition: transform 350ms cubic-bezier(0.34,1.56,0.64,1); z-index: 9999; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Design tokens (overridden by Tweaks) ─────────── */
    :root {
      --tw-brand:          #1e3a5f;
      --tw-accent:         #0b6f66;
      --tw-accent-hover:   #095e57;
      --tw-accent-light:   #f0fdf9;
      --tw-dark:           #0d1b2e;
      --tw-page-bg:        #ffffff;
      --tw-section-alt:    #f9fafb;
      --tw-text-heading:   #1e3a5f;
      --tw-text-body:      #4b5563;
      --tw-text-muted:     #6b7280;
      --tw-nav-bg:         #ffffff;
      --tw-nav-border:     #e5e7eb;
      --tw-nav-text:       #6b7280;
      --tw-trust-bg:       #1e3a5f;
      --tw-trust-text:     #14b8a6;
      --tw-trust-sub:      #94a3b8;
      --tw-footer-bg:      #0d1b2e;
      --tw-card-bg:        #ffffff;
      --tw-card-border:    #e5e7eb;
      --tw-hero-left-bg:   #ffffff;
      --tw-hero-right-disp:flex;
      --tw-hero-cols:      1fr 1fr;
      --tw-hero-align:     left;
      --tw-hero-h1:        #1e3a5f;
      --tw-hero-sub:       #4b5563;
      --tw-h1-size:        52px;
      --tw-h1-weight:      800;
      --tw-h1-tracking:    -0.02em;
      --tw-h2-size:        40px;
      --tw-h2-weight:      800;
      --tw-h2-tracking:    -0.02em;
      --tw-body-size:      16px;
      --tw-body-lh:        1.6;
      --tw-outcome-bg:     #f0fdf9;
      --tw-outcome-border: #a7f3d0;
      --tw-outcome-title:  #0b6f66;
      --tw-step-dot:       #0b6f66;
    }
    button, a, input, textarea { -webkit-tap-highlight-color: rgba(11,111,102,0.16); }
    button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 3px solid rgba(20,184,166,0.42);
      outline-offset: 4px;
    }
    button {
      font: inherit;
      min-width: 44px;
      min-height: 44px;
    }
    input, textarea { min-height: 44px; }
    .sg-menu-toggle { display: none; }
    .sg-nav-link, .sg-secondary-link {
      min-height: 44px;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center;
    }
    /* Hero layout variants */
    [data-hero-style='centered'] [data-tw-hero-grid] { grid-template-columns: 1fr !important; }
    [data-hero-style='centered'] [data-tw-hero-right] { display: none !important; }
    [data-hero-style='centered'] [data-tw-hero-left] { text-align: center; padding: 100px 80px !important; }
    [data-hero-style='centered'] [data-tw-hero-ctas],
    [data-hero-style='centered'] [data-tw-hero-stats] { justify-content: center !important; }
    [data-hero-style='full-dark'] [data-tw-hero-grid] { grid-template-columns: 1fr !important; }
    [data-hero-style='full-dark'] [data-tw-hero-right] { display: none !important; }
    [data-hero-style='full-dark'] [data-tw-hero-left] { background: linear-gradient(135deg, #0d1b2e 0%, #1e3a5f 100%) !important; padding: 100px 80px !important; }
    [data-hero-style='full-dark'] [data-tw-hero-h1] { color: #ffffff !important; }
    [data-hero-style='full-dark'] [data-tw-hero-sub] { color: rgba(255,255,255,0.72) !important; }
    [data-hero-style='full-dark'] [data-tw-hero-stats-num] { color: #ffffff !important; }
    [data-hero-style='full-dark'] [data-tw-hero-contact-link] { color: rgba(255,255,255,0.8) !important; border-bottom-color: rgba(255,255,255,0.4) !important; }
    /* Type scale variants */
    [data-type-scale='refined'] [data-tw-h1] { font-size: 44px !important; font-weight: 600 !important; letter-spacing: 0.01em !important; }
    [data-type-scale='refined'] [data-tw-h2] { font-size: 32px !important; font-weight: 600 !important; letter-spacing: 0.01em !important; }
    [data-type-scale='refined'] [data-tw-body] { font-size: 17px !important; line-height: 1.8 !important; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
    @media (max-width: 1100px) {
      [data-tw-nav] { padding: 0 32px !important; }
      .sg-nav-links { gap: 16px !important; }
      [data-tw-hero-left] { padding: 72px 40px !important; }
      [data-tw-h1] { font-size: clamp(38px, 5vw, 48px) !important; }
      [data-tw-h2] { font-size: clamp(30px, 4vw, 40px) !important; }
      [data-tw-section-bg], [data-tw-section-alt], #contact, footer, .sg-integrations { padding-left: 48px !important; padding-right: 48px !important; }
      .sg-grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
      .sg-grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
      .sg-footer-grid { grid-template-columns: 1.5fr 1fr 1fr !important; }
    }
    @media (max-width: 860px) {
      #page-scroll { overflow-x: hidden; }
      [data-tw-nav] { padding: 0 20px !important; }
      .sg-logo-button img { width: 156px !important; }
      .sg-menu-toggle {
        display: inline-flex;
        width: 44px;
        height: 44px;
        border: 1px solid #e5e7eb;
        border-radius: 9999px;
        background: #ffffff;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 4px;
        cursor: pointer;
      }
      .sg-menu-toggle span { width: 18px; height: 2px; background: #1e3a5f; border-radius: 2px; }
      .sg-nav-links {
        position: absolute;
        top: 72px;
        left: 16px;
        right: 16px;
        display: none !important;
        flex-direction: column;
        align-items: stretch !important;
        gap: 6px !important;
        padding: 14px;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 18px 48px rgba(30,58,95,0.16);
      }
      .sg-nav-links[data-open='true'] { display: flex !important; }
      .sg-nav-link {
        min-height: 44px;
        width: 100%;
        text-align: left;
        padding: 11px 14px !important;
        border-bottom: none !important;
        border-radius: 10px !important;
      }
      .sg-nav-cta { text-align: center; }
      [data-tw-hero-grid] { grid-template-columns: 1fr !important; min-height: 0 !important; }
      [data-tw-hero-right] { display: none !important; }
      [data-tw-hero-left] { padding: 64px 24px !important; }
      [data-tw-hero-ctas] { flex-direction: column; align-items: stretch !important; }
      [data-tw-hero-ctas] button { min-height: 48px; justify-content: center; }
      [data-tw-h1] { font-size: clamp(34px, 10vw, 46px) !important; }
      [data-tw-h2] { font-size: clamp(27px, 8vw, 36px) !important; }
      [data-tw-section-bg], [data-tw-section-alt], #contact, footer, .sg-integrations { padding: 64px 24px !important; }
      .sg-grid-3, .sg-grid-4, .sg-split-grid, .sg-footer-grid { grid-template-columns: 1fr !important; }
      .sg-process-grid > div:first-child { display: none !important; }
      .sg-differentiation-grid { border-radius: 14px !important; }
      .sg-service-trust-actions { width: 100%; justify-content: flex-start !important; flex-wrap: wrap; }
      .sg-footer-bottom { flex-direction: column; align-items: flex-start !important; gap: 14px; }
      #contact form > div:first-child { grid-template-columns: 1fr !important; }
      input, textarea, button { min-height: 44px; }
      button { min-width: 44px; }
    }
    @media (max-width: 480px) {
      [data-tw-hero-left] { padding: 56px 20px !important; }
      [data-tw-section-bg], [data-tw-section-alt], #contact, footer, .sg-integrations { padding: 56px 20px !important; }
      #contact > div { max-width: none !important; }
      #contact form { gap: 16px !important; }
      #contact input, #contact textarea { width: 100% !important; }
      .sg-int-chip { width: 48px !important; height: 48px !important; }
    }
  </style>
</head>
